<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>真实3人公共森林投入任务</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: #f4f7f6;
      color: #1f2933;
    }
    .page {
      max-width: 920px;
      margin: 36px auto;
      background: #fff;
      padding: 38px 46px;
      border-radius: 18px;
      box-shadow: 0 8px 28px rgba(0,0,0,.08);
    }
    h1 { font-size: 28px; margin: 0 0 22px; color: #0f5132; }
    h2 { font-size: 21px; margin: 24px 0 14px; color: #14532d; }
    p, li { font-size: 17px; line-height: 1.85; }
    button {
      background: #166534;
      color: #fff;
      border: none;
      padding: 13px 24px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
      margin-right: 10px;
    }
    button:hover { background: #14532d; }
    button.secondary { background: #64748b; }
    button.secondary:hover { background: #475569; }
    input, select {
      width: 100%;
      padding: 11px 12px;
      margin: 8px 0 18px;
      font-size: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
    }
    label { font-size: 16px; }
    table { width: 100%; border-collapse: collapse; margin: 16px 0; }
    th, td { border: 1px solid #dbe3ea; padding: 10px; text-align: center; font-size: 15px; }
    th { background: #f1f5f9; }
    .highlight {
      background: #edf7ed;
      border-left: 5px solid #2f855a;
      padding: 16px 18px;
      margin: 20px 0;
      border-radius: 10px;
      font-size: 17px;
      line-height: 1.8;
    }
    .norm-cue {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-left: 5px solid #16a34a;
      padding: 14px 16px;
      margin: 18px 0 22px;
      border-radius: 10px;
      font-size: 16px;
      line-height: 1.75;
    }
    .norm-cue .cue-title {
      font-weight: bold;
      color: #14532d;
      margin-bottom: 6px;
    }
    .norm-cue p {
      margin: 4px 0;
      font-size: 16px;
      line-height: 1.75;
    }
    .control-cue {
      background: #f8fafc;
      border-color: #cbd5e1;
      border-left-color: #94a3b8;
    }
    .static-cue {
      background: #f8fafc;
      border-color: #cbd5e1;
      border-left-color: #64748b;
    }
    .dynamic-cue {
      background: #ecfdf5;
      border-color: #bbf7d0;
      border-left-color: #16a34a;
    }
    .warning {
      background: #fff7ed;
      border-left: 5px solid #f97316;
      padding: 14px 18px;
      margin: 20px 0;
      border-radius: 10px;
      font-size: 16px;
    }
    .muted { color: #64748b; font-size: 14px; }
    .choice-grid {
      display: grid;
      grid-template-columns: repeat(11, 1fr);
      gap: 8px;
      margin: 24px 0;
    }
    .choice-btn {
      background: #e2e8f0;
      color: #0f172a;
      border-radius: 10px;
      padding: 14px 0;
      font-size: 18px;
      cursor: pointer;
      text-align: center;
      border: 2px solid transparent;
      user-select: none;
    }
    .choice-btn:hover { background: #cbd5e1; }
    .choice-btn.selected {
      background: #bbf7d0;
      border-color: #16a34a;
      color: #14532d;
      font-weight: bold;
    }
    .progress-box {
      background: #f8fafc;
      padding: 16px;
      border-radius: 12px;
      margin: 18px 0;
      border: 1px solid #e2e8f0;
    }
    .bar-wrap {
      width: 100%;
      height: 18px;
      background: #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
    }
    .bar { height: 18px; background: #16a34a; width: 0%; transition: width .3s ease; }
    .radio-row { margin: 16px 0; line-height: 1.9; }
    .radio-row input { width: auto; margin-right: 8px; }
    .scale-row {
      margin: 18px 0;
      padding: 14px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      background: #f8fafc;
    }
    .scale-options {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-top: 12px;
      text-align: center;
    }
    .scale-options input { width: auto; margin: 3px; }
    .scale-anchor {
      display: flex;
      justify-content: space-between;
      color: #64748b;
      font-size: 14px;
      margin-top: 6px;
    }
    .version {
      position: fixed;
      right: 10px;
      bottom: 8px;
      color: #94a3b8;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="version">V13 GitHub Pages · decision norm cue</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      set,
      update,
      get,
      onValue,
      runTransaction,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBHY2cyfWiaUKsYmiq5gGQrNX5dOIGFb4A",
      authDomain: "dyadic-forest-study.firebaseapp.com",
      databaseURL: "https://dyadic-forest-study-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "dyadic-forest-study",
      storageBucket: "dyadic-forest-study.firebasestorage.app",
      messagingSenderId: "869925379541",
      appId: "1:869925379541:web:9d72b7c8e91d029f69b15c",
      measurementId: "G-9FEZ2CYLYF"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getDatabase(fbApp);

    const BASE_PATH = "public_forest_3person_v14_decision_text_update";
    const GROUP_SIZE = 3;
    const BLOCKS = 2;
    const TRIALS_PER_BLOCK = 8;
    const BLOCK_TARGET = 120;
    const MATCH_TIMEOUT_MS = 5 * 60 * 1000;
    const CONDITIONS = ["control", "static", "dynamic"];

    const PROJECTS = [
      {
        name: "城市防护林保护",
        desc: "本项目关注城市周边防护林保护。防护林可以帮助改善空气质量、减少风沙，并维护城市周边生态环境。"
      },
      {
        name: "水源涵养林修复",
        desc: "本项目关注水源涵养林修复。水源涵养林可以帮助保持水土、涵养水源，并维护区域生态平衡。"
      }
    ];

    const questionnaireItems = [
      { key: "future_expectation_1", text: "在未来，你认为人们会在多大程度上努力去保护环境？", left: "完全不会", right: "非常会" },

      { key: "collective_self_efficacy_1", text: "我们可以共同解决环境问题。" },
      { key: "collective_self_efficacy_2", text: "我们有足够的力量解决环境问题。" },
      { key: "collective_self_efficacy_3", text: "我们可以解决破坏环境带来的问题。" },

      { key: "response_efficacy_1", text: "我认为我的行动会对气候变化产生影响。" },
      { key: "response_efficacy_2", text: "我认为我的行动会对我如何感受和思考气候变化及一般环境问题产生积极影响。" },
      { key: "response_efficacy_3", text: "我在社区中减少气候变化影响的行动会鼓励他人也采取行动减少全球变暖的影响。" },

      { key: "green_self_identity_1", text: "我认为自己是一个非常关心环境问题的人。" },
      { key: "green_self_identity_2", text: "环保是我身份中重要的一部分。" },
      { key: "green_self_identity_3", text: "我认同环保组织所倡导的目标。" },
      { key: "green_self_identity_4", text: "我认为自己是一个环保消费者。" },
      { key: "green_self_identity_5", text: "我是那种会采取环保行为的人。" },

      { key: "personal_norm_1", text: "我觉得自己有责任采取环保行为。" },
      { key: "personal_norm_2", text: "如果我不采取环保行为，我会感到内疚。" },
      { key: "personal_norm_3", text: "保护环境是我应该做的事情。" },

      { key: "dynamic_norm_manipulation_1", text: "我认为公共森林捐赠正在变得越来越普遍。" },
      { key: "dynamic_norm_manipulation_2", text: "我认为未来会有更多人参与公共森林捐赠。" },
      { key: "static_norm_manipulation_1", text: "我认为目前已有不少人参与公共森林捐赠。" },
      { key: "static_norm_manipulation_2", text: "我认为公共森林捐赠在当前参与者中较为常见。" },

      { key: "personal_influence_1", text: "我觉得自己的捐赠会影响公共森林的状态。" },
      { key: "personal_influence_2", text: "我觉得我在任务中的选择会影响最终环保捐赠。" },
      { key: "personal_influence_3", text: "我觉得自己的行为能够帮助公共森林维持下去。" },

      { key: "partner_influence_1", text: "我觉得其他成员的选择会影响我的捐赠决策。" },
      { key: "partner_influence_2", text: "我会根据其他成员上一轮的捐赠情况调整自己的选择。" },
      { key: "partner_influence_3", text: "我觉得我们三人的选择共同决定了公共森林的结果。" },

      { key: "seriousness", text: "你在任务中是否认真做出了选择？", left: "非常不认真", right: "非常认真" },
      { key: "suspicion", text: "你是否怀疑任务中的信息或设置？", left: "完全不怀疑", right: "非常怀疑" },
      { key: "noticed_stage_difference", text: "你是否注意到两个任务阶段之间存在不同？", left: "完全没有注意到", right: "非常明显地注意到" },
      { key: "background_info_influence", text: "你认为任务开始前的背景信息是否影响了你的选择？", left: "完全没有影响", right: "影响非常大" }
    ];

    const state = {
      participantId: "",
      groupId: "",
      roleId: "",
      slot: null,
      condition: "",
      groupNumber: null,
      info: {},
      currentBlock: 1,
      currentTrial: 1,
      selectedDonation: null,
      trialStartTime: null
    };

    const appDiv = document.getElementById("app");

    function uid(prefix) {
      return `${prefix}_${Math.random().toString(36).slice(2, 10)}_${Date.now()}`;
    }

    function render(html) {
      appDiv.innerHTML = `<div class="page">${html}</div>`;
      window.scrollTo(0, 0);
    }

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function percent(num, den) {
      if (!den || den <= 0) return 0;
      return Math.min(100, Math.round((Number(num) / Number(den)) * 100));
    }

    function conditionName(condition) {
      if (condition === "control") return "控制组";
      if (condition === "static") return "静态规范组";
      if (condition === "dynamic") return "动态规范组";
      return condition;
    }

    async function saveProgress(pageName, extra = {}) {
      if (!state.groupId || !state.participantId) return;
      await update(ref(db, `${BASE_PATH}/groups/${state.groupId}/members/${state.participantId}`), {
        last_page: pageName,
        last_update: serverTimestamp(),
        ...extra
      });
    }

    async function getGroupData() {
      const snap = await get(ref(db, `${BASE_PATH}/groups/${state.groupId}`));
      return snap.val() || {};
    }

    function pageWelcome() {
      render(`
        <h1>欢迎参加实验</h1>
        <p>欢迎参加本研究。</p>
        <p>本研究关注人们在公共环境保护情境中的决策行为。实验过程中，你将和另外两名参与者组成一个 3 人小组，共同完成公共森林投入任务。</p>
        <p>请认真阅读屏幕上的内容，并根据自己的真实想法做出选择。</p>
        <button id="startBtn">开始实验</button>
      `);
      document.getElementById("startBtn").onclick = pageConsent;
    }

    function pageConsent() {
      render(`
        <h1>实验知情同意</h1>
        <p>在本研究中，你将完成若干轮公共森林投入决策任务。你的选择将用于研究人们在环境保护情境下的决策过程。</p>
        <p>实验数据仅用于科学研究，所有数据将匿名保存。你可以在任何时候退出实验，但只有认真完成全部任务的数据才会被纳入分析。</p>
        <p>如果你同意参加本实验，请点击下方按钮继续。</p>
        <button id="agreeBtn">我已阅读并同意参加实验</button>
      `);
      document.getElementById("agreeBtn").onclick = pageBasicInfo;
    }

    function pageBasicInfo() {
      render(`
        <h1>基本信息</h1>
        <label>姓名 / 编号</label>
        <input id="name" placeholder="请输入姓名或编号" />
        <label>年龄</label>
        <input id="age" type="number" placeholder="请输入年龄" />
        <label>性别</label>
        <select id="gender">
          <option value="">请选择</option>
          <option value="男">男</option>
          <option value="女">女</option>
          <option value="其他">其他</option>
          <option value="不愿透露">不愿透露</option>
        </select>
        <label>学校</label>
        <input id="school" placeholder="请输入学校" />
        <label>学院 / 专业</label>
        <input id="major" placeholder="请输入学院或专业" />
        <label>年级</label>
        <input id="grade" placeholder="请输入年级" />
        <button id="nextBtn">下一页</button>
      `);
      document.getElementById("nextBtn").onclick = async () => {
        const name = document.getElementById("name").value.trim();
        const age = document.getElementById("age").value.trim();
        const gender = document.getElementById("gender").value;
        const school = document.getElementById("school").value.trim();
        const major = document.getElementById("major").value.trim();
        const grade = document.getElementById("grade").value.trim();
        if (!name || !age || !gender) {
          alert("请至少填写姓名/编号、年龄和性别。");
          return;
        }
        state.participantId = uid("P");
        state.info = { name, age, gender, school, major, grade };
        await joinGroup();
      };
    }

    async function joinGroup() {
      render(`
        <h1>正在匹配小组成员</h1>
        <p>系统正在为你匹配另外两名参与者。</p>
        <p>匹配成功后，你们三人将组成一个小组，共同完成公共森林投入任务。</p>
        <div class="warning" id="matchStatus">正在加入匹配队列……</div>
      `);

      const now = Date.now();
      const matchRef = ref(db, `${BASE_PATH}/matchState`);
      const result = await runTransaction(matchRef, (current) => {
        const expired = current?.createdAtMs && (now - current.createdAtMs > MATCH_TIMEOUT_MS);
        const needNewGroup = !current || !current.activeGroupId || current.status === "full" || (current.nextSlot || 1) > GROUP_SIZE || expired;

        if (needNewGroup) {
          const groupCounter = (current?.groupCounter || 0) + 1;
          const groupId = uid("G");
          const condition = CONDITIONS[(groupCounter - 1) % CONDITIONS.length];
          return {
            groupCounter,
            activeGroupId: groupId,
            condition,
            nextSlot: 2,
            status: "waiting",
            createdAtMs: now,
            activeMembers: {
              [state.participantId]: 1
            }
          };
        }

        current.activeMembers = current.activeMembers || {};
        if (!current.activeMembers[state.participantId]) {
          const slot = current.nextSlot || 1;
          current.activeMembers[state.participantId] = slot;
          current.nextSlot = slot + 1;
          current.status = slot >= GROUP_SIZE ? "full" : "waiting";
        }
        return current;
      });

      const matchData = result.snapshot.val();
      state.groupId = matchData.activeGroupId;
      state.condition = matchData.condition;
      state.groupNumber = matchData.groupCounter;
      state.slot = matchData.activeMembers[state.participantId];
      state.roleId = `成员${state.slot}`;

      await update(ref(db, `${BASE_PATH}/groups/${state.groupId}`), {
        groupId: state.groupId,
        groupNumber: state.groupNumber,
        condition: state.condition,
        status: matchData.status,
        createdAtMs: matchData.createdAtMs,
        updatedAt: serverTimestamp()
      });

      await set(ref(db, `${BASE_PATH}/groups/${state.groupId}/members/${state.participantId}`), {
        participantId: state.participantId,
        roleId: state.roleId,
        slot: state.slot,
        info: state.info,
        joinedAt: serverTimestamp(),
        last_page: "matched"
      });

      await set(ref(db, `${BASE_PATH}/participants/${state.participantId}`), {
        participantId: state.participantId,
        groupId: state.groupId,
        groupNumber: state.groupNumber,
        condition: state.condition,
        roleId: state.roleId,
        slot: state.slot,
        info: state.info,
        joinedAt: serverTimestamp()
      });

      if (matchData.status === "full") {
        await update(ref(db, `${BASE_PATH}/groups/${state.groupId}`), {
          status: "full",
          formedAt: serverTimestamp()
        });
      }

      listenForGroupFull();
    }

    function listenForGroupFull() {
      const membersRef = ref(db, `${BASE_PATH}/groups/${state.groupId}/members`);
      let moved = false;
      const unsubscribe = onValue(membersRef, async (snap) => {
        const members = snap.val() || {};
        const count = Object.keys(members).length;
        const statusEl = document.getElementById("matchStatus");
        if (statusEl) statusEl.textContent = `当前状态：等待成员加入（${count}/${GROUP_SIZE}）`;
        if (!moved && count >= GROUP_SIZE) {
          moved = true;
          unsubscribe();
          await update(ref(db, `${BASE_PATH}/groups/${state.groupId}`), { status: "full", formedAt: serverTimestamp() });
          pageGroupIntro();
        }
      });
    }

    async function pageGroupIntro() {
      await saveProgress("group_intro");
      render(`
        <h1>你的小组</h1>
        <p>你已经成功加入一个 3 人小组。</p>
        <p>为保护隐私，系统将使用匿名编号显示小组成员：</p>
        <div class="highlight">
          <p>你：${escapeHtml(state.roleId)}</p>
          <p>另外两名参与者：其他匿名成员</p>
        </div>
        <p>在任务过程中，你们三人将分别做出决策。公共森林账户中的累计投入将反映小组对公共森林项目的支持程度。</p>
        <p>请注意，任务过程中不能与其他成员交流。</p>
        <button id="nextBtn">继续</button>
      `);
      document.getElementById("nextBtn").onclick = pageTaskBackground;
    }

    async function pageTaskBackground() {
      await saveProgress("task_background");
      render(`
        <h1>公共森林投入任务</h1>
        <p>在接下来的任务中，你将和另外两名成员共同参与公共森林投入任务。</p>
        <p>公共森林账户代表一项环境保护资源。每位成员都可以选择将一部分个人资源投入公共森林账户，用于支持森林保护和生态恢复。</p>
        <p>投入公共森林账户的资源越多，代表对公共森林项目的支持越多；保留的资源越多，你获得的个人积分越多。</p>
        <button id="nextBtn">继续</button>
      `);
      document.getElementById("nextBtn").onclick = pageRule;
    }

    async function pageRule() {
      await saveProgress("rule");
      let rows = "";
      for (let i = 0; i <= 10; i++) rows += `<tr><td>${i} 点</td><td>${10 - i} 分</td></tr>`;
      render(`
        <h1>每轮选择规则</h1>
        <p>在每一轮中，你和另外两名成员都会分别获得 <b>10 点资源</b>。</p>
        <p>你需要选择将多少资源点投入公共森林账户。未投入公共森林账户的资源点将保留为你的个人积分。</p>
        <table>
          <thead><tr><th>你投入公共森林账户</th><th>你保留的个人积分</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <p>个人积分会根据实验规则随机选择一轮进行结算，并按照一定比例兑换为金钱，作为被试费的一部分支付。</p>
        <p>公共森林账户中的资源会按照实验规则折算为真实环保捐赠，捐赠至中华环境保护基金会，用于支持环境保护相关公益项目。</p>
        <p>请根据自己的真实想法做出决定。</p>
        <button id="nextBtn">我明白了</button>
      `);
      document.getElementById("nextBtn").onclick = pageGoal;
    }

    async function pageGoal() {
      await saveProgress("goal");
      render(`
        <h1>公共森林项目目标</h1>
        <p>本实验共有 <b>${BLOCKS}</b> 个公共森林项目，每个项目包含 <b>${TRIALS_PER_BLOCK}</b> 轮决策。</p>

    async function calculateBlockCumulative(blockIndex, throughTrial) {
      const groupData = await getGroupData();
      let sum = 0;
      for (let t = 1; t <= throughTrial; t++) {
        const choices = groupData?.blocks?.[`block_${blockIndex}`]?.trials?.[`trial_${t}`]?.choices || {};
        Object.values(choices).forEach(ch => sum += Number(ch.donation || 0));
      }
      return sum;
    }

    async function pageTrialFeedback(blockIndex, trialIndex) {
      const groupData = await getGroupData();
      const choices = groupData?.blocks?.[`block_${blockIndex}`]?.trials?.[`trial_${trialIndex}`]?.choices || {};
      const myChoice = choices[state.participantId];
      const cumulative = await calculateBlockCumulative(blockIndex, trialIndex);
      await update(ref(db, `${BASE_PATH}/groups/${state.groupId}/blocks/block_${blockIndex}/trials/trial_${trialIndex}`), {
        cumulative_after: cumulative,
        updatedAt: serverTimestamp()
      });
      render(`
        <h1>本轮结果</h1>
        <div class="highlight">
          <p>你本轮投入公共森林账户：</p>
          <p><b>${myChoice?.donation ?? ""} 点</b></p>
          <p>你本轮保留个人积分：</p>
          <p><b>${myChoice?.personal_points ?? ""} 分</b></p>
        </div>
        <div class="progress-box">
          <p>当前项目公共森林累计投入：</p>
          <p><b>${cumulative} / ${BLOCK_TARGET} 点</b></p>
          <div class="bar-wrap"><div class="bar" style="width:${percent(cumulative, BLOCK_TARGET)}%"></div></div>
        </div>
        <button id="nextBtn">${trialIndex < TRIALS_PER_BLOCK ? "进入下一轮" : "查看项目结果"}</button>
      `);
      document.getElementById("nextBtn").onclick = () => {
        if (trialIndex < TRIALS_PER_BLOCK) {
          markReadyForTrial(blockIndex, trialIndex + 1);
        } else {
          pageBlockEnd(blockIndex);
        }
      };
    }

    async function pageBlockEnd(blockIndex) {
      const groupData = await getGroupData();
      let groupTotal = 0;
      let myDonationTotal = 0;
      let myPersonalTotal = 0;
      for (let t = 1; t <= TRIALS_PER_BLOCK; t++) {
        const choices = groupData?.blocks?.[`block_${blockIndex}`]?.trials?.[`trial_${t}`]?.choices || {};
        Object.values(choices).forEach(ch => groupTotal += Number(ch.donation || 0));
        const my = choices[state.participantId];
        if (my) {
          myDonationTotal += Number(my.donation || 0);
          myPersonalTotal += Number(my.personal_points || 0);
        }
      }
      const success = groupTotal >= BLOCK_TARGET;
      await update(ref(db, `${BASE_PATH}/groups/${state.groupId}/blocks/block_${blockIndex}`), {
        groupTotal,
        target: BLOCK_TARGET,
        success,
        completedAt: serverTimestamp()
      });
      render(`
        <h1>项目 ${blockIndex} 完成</h1>
        <p>你已经完成第 ${blockIndex} 个公共森林项目的 ${TRIALS_PER_BLOCK} 轮决策。</p>
        <div class="progress-box">
          <p>本项目公共森林累计投入：</p>
          <p><b>${groupTotal} / ${BLOCK_TARGET} 点</b></p>
          <div class="bar-wrap"><div class="bar" style="width:${percent(groupTotal, BLOCK_TARGET)}%"></div></div>
        </div>
        <div class="highlight">
          <p>结果：</p>
          <p><b>${success ? "本项目达到公共森林保护目标。" : "本项目未达到公共森林保护目标。"}</b></p>
        </div>
        <p>你在本项目中累计投入公共森林账户：<b>${myDonationTotal} 点</b></p>
        <p>你在本项目中累计保留个人积分：<b>${myPersonalTotal} 分</b></p>
        <button id="nextBtn">${blockIndex < BLOCKS ? "进入下一个公共森林项目" : "进入问卷"}</button>
      `);
      document.getElementById("nextBtn").onclick = () => {
        if (blockIndex < BLOCKS) {
          pageConditionInfo(blockIndex + 1);
        } else {
          pageQuestionnaire(0, {});
        }
      };
    }

    function scaleItem(item) {
      const left = item.left || "非常不同意";
      const right = item.right || "非常同意";
      return `
        <div class="scale-row">
          <p>${escapeHtml(item.text)}</p>
          <div class="scale-anchor"><span>${escapeHtml(left)}</span><span>${escapeHtml(right)}</span></div>
          <div class="scale-options">
            ${[1,2,3,4,5,6,7].map(v => `
              <label><input type="radio" name="${item.key}" value="${v}"><br>${v}</label>
            `).join("")}
          </div>
        </div>
      `;
    }

    function pageQuestionnaire(pageIndex, answers) {
      const pageSize = 5;
      const totalPages = Math.ceil(questionnaireItems.length / pageSize);
      const start = pageIndex * pageSize;
      const items = questionnaireItems.slice(start, start + pageSize);
      render(`
        <p class="muted">问卷 ${pageIndex + 1} / ${totalPages}</p>
        <p><b>请根据你现在的感受，选择符合你的同意程度。</b></p>
        <p class="muted">1 表示最左侧描述，7 表示最右侧描述。请选择最符合你当前感受的选项。</p>
        ${items.map(scaleItem).join("")}
        <button id="prevBtn" class="secondary" ${pageIndex === 0 ? "style='display:none'" : ""}>上一页</button>
        <button id="nextBtn">${pageIndex === totalPages - 1 ? "提交问卷" : "下一页"}</button>
      `);
      if (pageIndex > 0) {
        document.getElementById("prevBtn").onclick = () => pageQuestionnaire(pageIndex - 1, answers);
      }
      document.getElementById("nextBtn").onclick = async () => {
        const newAnswers = { ...answers };
        for (const item of items) {
          const v = document.querySelector(`input[name="${item.key}"]:checked`)?.value;
          if (!v) {
            alert("请完成本页所有题目。");
            return;
          }
          newAnswers[item.key] = Number(v);
        }
        if (pageIndex < totalPages - 1) {
          pageQuestionnaire(pageIndex + 1, newAnswers);
        } else {
          await set(ref(db, `${BASE_PATH}/groups/${state.groupId}/members/${state.participantId}/questionnaire`), {
            ...newAnswers,
            submittedAt: serverTimestamp()
          });
          pageEnd();
        }
      };
    }

    async function pageEnd() {
      await update(ref(db, `${BASE_PATH}/groups/${state.groupId}/members/${state.participantId}`), {
        completed: true,
        completedAt: serverTimestamp(),
        last_page: "completed"
      });
      render(`
        <h1>实验结束</h1>
        <p>你已经完成本实验的全部内容。</p>
        <p>感谢你对本研究的支持！</p>
        <p>请不要与其他可能参加实验的人讨论实验内容，以免影响后续研究结果。</p>
        <div class="highlight">
          <p>你的完成编号：</p>
          <p><b>${state.participantId}</b></p>
        </div>
      `);
    }

    pageWelcome();
  </script>
</body>
</html>
