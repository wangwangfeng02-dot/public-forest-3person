const CONDITIONS = ["control", "static", "dynamic"];
const BLOCKS = 2;
const TRIALS_PER_BLOCK = 8;

const DECISION_TIMEOUT_MS = 15000;

  { name:"城市防护林保护", desc:"本项目关注城市周边防护林保护。防护林可以帮助改善空气质量、减少风沙，并维护城市周边生态环境。" },

];

let state = {
  participantId: "",
  groupId: "",
  groupNumber: null,
  roleId: "",
  condition: "",
  info: {},
  blockIndex: 1,
  trialIndex: 1,
  selectedDonation: null,
  trialStartTime: null,
  questionnaireResponses: {},

  enteredGroupIntro: false
};

const app = document.getElementById("app");
function render(html) { app.innerHTML = `<div class="page">${html}</div>`; window.scrollTo(0,0); }
function uid(prefix) { return `${prefix}_${Math.random().toString(36).slice(2,10)}_${Date.now()}`; }
function pct(x, y) { return Math.max(0, Math.min(100, Math.round((Number(x)||0)/(Number(y)||1)*100))); }
function esc(s) { return String(s ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;"); }
function conditionText(c) { return c === "control" ? "控制组" : c === "static" ? "静态规范组" : "动态规范组"; }
function absoluteTrial(block, trial) { return (block - 1) * TRIALS_PER_BLOCK + trial; }

async function ensureFirebase() {
  if (fb) return fb;
  try {
    const appMod = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
    const dbMod = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js");
    const fapp = appMod.initializeApp(firebaseConfig);
    const db = dbMod.getDatabase(fapp);
    fb = { ...dbMod, db };
    return fb;
  } catch (err) {
    render(`<h1>Firebase 加载失败</h1><div class="warn"><p>${esc(err.message)}</p></div><p>请检查网络是否能访问 Google Firebase SDK，或换浏览器/网络后重试。</p>`);
    throw err;
  }
}

async function dbSet(path, value) { const { ref, set, db } = await ensureFirebase(); return set(ref(db, `${BASE_PATH}/${path}`), value); }
async function dbUpdate(path, value) { const { ref, update, db } = await ensureFirebase(); return update(ref(db, `${BASE_PATH}/${path}`), value); }
async function dbGet(path) { const { ref, get, db } = await ensureFirebase(); const s = await get(ref(db, `${BASE_PATH}/${path}`)); return s.val(); }
async function dbServerTimestamp() { const { serverTimestamp } = await ensureFirebase(); return serverTimestamp(); }

async function saveProgress(page, extra={}) {
  if (!state.groupId || !state.participantId) return;
  await dbUpdate(`groups/${state.groupId}/members/${state.participantId}`, { last_page: page, last_update: await dbServerTimestamp(), ...extra });
}

function listen(path, callback) {
  ensureFirebase().then(({ ref, onValue, db }) => {
    onValue(ref(db, `${BASE_PATH}/${path}`), callback);
  });
}

async function matchGroup() {
  await ensureFirebase();
  render(`<h1>正在匹配小组成员</h1><p>系统正在为你匹配另外两名参与者。</p><p>匹配成功后，你们三人将组成一个小组，共同完成公共森林投入任务。</p><div class="warn" id="matchStatus">正在加入匹配队列……</div>`);

  const { ref, runTransaction, db, serverTimestamp } = await ensureFirebase();
  const matchRef = ref(db, `${BASE_PATH}/matchState`);

  const tx = await runTransaction(matchRef, (cur) => {
    const now = Date.now();

    function makeNewGroup(counter) {
      const groupNumber = (counter || 0) + 1;
      const condition = CONDITIONS[(groupNumber - 1) % CONDITIONS.length];
      return {
        counter: groupNumber,
        openGroup: {
          groupId: uid("G"),
          groupNumber,
          condition,
          status: "waiting",
          createdAt: now,
          slots: { "1": state.participantId }
        }
      };
    }

    if (!cur || !cur.openGroup || cur.openGroup.status === "full") {
      return makeNewGroup(cur?.counter || 0);
    }

    const g = cur.openGroup;
    g.slots = g.slots || {};

    // 如果同一个 participant 因刷新/重试再次进入，不重复占位
    const alreadySlot = Object.entries(g.slots).find(([slot, pid]) => pid === state.participantId);
    if (!alreadySlot) {
      for (let i = 1; i <= GROUP_SIZE; i++) {
        const key = String(i);
        if (!g.slots[key]) {
          g.slots[key] = state.participantId;
          break;
        }
      }
    }

    const filled = Object.values(g.slots).filter(Boolean).length;
    g.status = filled >= GROUP_SIZE ? "full" : "waiting";
    g.updatedAt = now;
    cur.openGroup = g;
    cur.counter = cur.counter || g.groupNumber || 1;
    return cur;
  });

  const match = tx.snapshot.val();
  const g = match.openGroup;
  const slots = g.slots || {};
  const mySlot = Object.keys(slots).find(slot => slots[slot] === state.participantId) || "1";

  state.groupId = g.groupId;
  state.groupNumber = g.groupNumber;
  state.condition = g.condition;
  state.roleId = `成员${mySlot}`;

  const roster = {};
  Object.entries(slots).forEach(([slot, pid]) => {
    if (pid) roster[`member_${slot}`] = pid;
  });
  const memberCount = Object.keys(roster).length;

  await dbUpdate(`groups/${state.groupId}/metadata`, {
    groupId: state.groupId,
    groupNumber: state.groupNumber,
    condition: state.condition,
    status: memberCount >= GROUP_SIZE ? "full" : "waiting",
    memberCount,
    roster,
    updatedAt: serverTimestamp()
  });

  await dbSet(`groups/${state.groupId}/members/${state.participantId}`, {
    participantId: state.participantId,
    roleId: state.roleId,
    slot: Number(mySlot),
    info: state.info,
    joinedAt: serverTimestamp(),
    last_page: "matched"
  });

  await dbSet(`participants/${state.participantId}`, {
    participantId: state.participantId,
    groupId: state.groupId,
    groupNumber: state.groupNumber,
    roleId: state.roleId,
    slot: Number(mySlot),
    condition: state.condition,
    info: state.info,
    joinedAt: serverTimestamp()
  });

  // 关键修复：监听 metadata.roster，而不是只监听 members。
  // 第3名成员进入后会写入完整 roster，前两名成员会稳定收到 3/3 信号。
  listen(`groups/${state.groupId}/metadata`, async (snap) => {
    const meta = snap.val() || {};
    const count = meta.memberCount || Object.keys(meta.roster || {}).length || 0;
    const el = document.getElementById("matchStatus");
    if (el) el.textContent = `当前状态：已加入小组，等待成员到齐（${count}/${GROUP_SIZE}）`;

    if (count >= GROUP_SIZE && !state.enteredGroupIntro) {
      state.enteredGroupIntro = true;
      await dbUpdate(`groups/${state.groupId}/metadata`, {
        status: "full",
        formedAt: serverTimestamp()
      });
      pageGroupIntro();
    }
  });
}

function radioBlock(name, title, opts) {
  return `<div class="radio-block"><p><b>${title}</b></p>${opts.map(o=>`<label><input type="radio" name="${name}" value="${o[0]}">${o[0]}. ${o[1]}</label><br>`).join("")}</div>`;
}
function getRadioValues(names) {
  const out = {};
  for (const n of names) {
    const v = document.querySelector(`input[name="${n}"]:checked`)?.value;
    if (!v) return null;
    out[n] = v;
  }
  return out;
}

/*********************** 条件呈现 + 阅读理解：每个block前都呈现 ***********************/
async function pageConditionInfo(block) {
  state.blockIndex = block;
  state.trialIndex = 1;
  await saveProgress("condition_info", { blockIndex:block, condition:state.condition });
  const prefix = block === 1 ? "任务开始前说明" : "新的公共森林项目即将开始";
  if (state.condition === "control") {
    render(`<h1>${prefix}</h1><p>在接下来的任务中，你将和另外两名成员共同完成公共森林投入任务。</p><p>公共森林账户代表一项环境保护资源。每位成员可以选择将一部分个人资源投入公共森林账户，用于支持森林保护和生态恢复。</p><p>每一轮中，你都会获得 10 点资源。你可以选择将 0–10 点中的任意资源投入公共森林账户，未投入的资源将保留为你的个人积分。</p><p>请根据自己的真实想法完成接下来的公共森林投入任务。</p><button id="go">我已阅读，继续</button>`);
  } else if (state.condition === "static") {
    render(`<h1>${prefix}</h1><p>在正式任务开始前，你将看到一条来自前期参与者的数据概况。</p><p>公共森林账户代表一项环境保护资源。参与者可以选择将一部分个人资源投入公共森林账户，用于支持森林保护和生态恢复。</p><div class="greenbox"><p><b>根据最近一批同类任务数据：</b></p><p><b>约 30% 的参与者在多数轮次中选择向公共森林账户投入 5 点及以上。</b></p></div><p>这一数据反映了最近一批参与者在公共森林投入任务中的选择情况。</p><p>请认真阅读以上信息。阅读完成后，请继续完成接下来的公共森林投入任务。</p><button id="go">我已阅读，继续</button>`);
  } else {
    render(`<h1>${prefix}</h1><p>在正式任务开始前，你将看到一条来自前期参与者的数据概况。</p><p>公共森林账户代表一项环境保护资源。参与者可以选择将一部分个人资源投入公共森林账户，用于支持森林保护和生态恢复。</p><div class="greenbox"><p><b>根据前期不同批次的同类任务数据：</b></p><p><b>选择向公共森林账户投入 5 点及以上的参与者比例，从较早一批的 5% 上升到最近一批的 30%。</b></p></div><p>也就是说，选择向公共森林账户投入较多资源的参与者比例增加了 <b>25 个百分点</b>，达到较早一批的 <b>6 倍</b>。</p><div class="greenbox"><p><b>这一变化表明：</b></p><p><b>公共森林保护正在吸引越来越多参与者加入。</b></p><p><b>和过去相比，现在有更多人愿意为了环境保护而投入较多个人资源。</b></p><p><b>如果这种变化继续发展，未来可能会有更多参与者愿意投入公共森林账户。</b></p></div><p>请认真阅读以上信息。阅读完成后，请继续完成接下来的公共森林投入任务。</p><button id="go">我已阅读，继续</button>`);
  }
  document.getElementById("go").onclick = () => pageConditionCheck(block);
}

async function pageConditionCheck(block) {
  await saveProgress("condition_check", { blockIndex:block });
  let html;
  if (state.condition === "control") {
    html = `<h1>信息理解检查</h1><p>刚才的信息主要提醒你什么？</p>${radioBlock("cq", "请选择最符合的一项：", [["A","根据自己的真实想法完成公共森林投入任务"],["B","已有30%的参与者投入5点及以上"],["C","投入5点及以上的人正在增加"]])}<button id="go">提交答案</button>`;
  } else if (state.condition === "static") {
    html = `<h1>信息理解检查</h1><p>刚才的信息主要表达了什么？</p>${radioBlock("cq", "请选择最符合的一项：", [["A","最近一批参与者中，约有30%的人多数轮次投入5点及以上"],["B","选择投入公共森林账户的人正在增加"],["C","未来一定会有更多人投入公共森林账户"]])}<button id="go">提交答案</button>`;
  } else {
    html = `<h1>信息理解检查</h1><p>刚才的信息主要表达了什么？</p>${radioBlock("cq", "请选择最符合的一项：", [["A","最近一批参与者中，有固定比例的人投入公共森林账户"],["B","投入5点及以上的参与者比例从较早批次到最近批次有所增加，并呈现出未来可能继续扩大的趋势"],["C","所有参与者都会投入公共森林账户"]])}<button id="go">提交答案</button>`;
  }
  render(html);
  document.getElementById("go").onclick = async () => {
    const ans = document.querySelector('input[name="cq"]:checked')?.value;
    if (!ans) return alert("请选择答案。");
    const correct = (state.condition === "control" && ans === "A") || (state.condition === "static" && ans === "A") || (state.condition === "dynamic" && ans === "B");
    await dbSet(`groups/${state.groupId}/members/${state.participantId}/condition_checks/block_${block}`, { answer:ans, correct, blockIndex:block, submittedAt: await dbServerTimestamp() });
    if (!correct) { alert("阅读理解题回答错误，请重新阅读信息。"); return pageConditionInfo(block); }
    pageProjectStart(block);
  };
}

async function pageProjectStart(block) {
  await saveProgress("project_start", { blockIndex:block });
  const p = PROJECTS[block-1] || PROJECTS[0];
  render(`<h1>公共森林项目 ${block}：${p.name}</h1><p>接下来你将和另外两名成员共同完成第 ${block} 个公共森林项目。</p><p>${p.desc}</p><p>本项目共有 <b>${TRIALS_PER_BLOCK} 轮决策</b>。每轮中，你和另外两名成员都会获得 10 点资源，并分别决定投入多少资源到公共森林账户。</p><div class="greenbox"><p>本项目保护参考目标：</p><p><b>三名成员 ${TRIALS_PER_BLOCK} 轮累计投入达到 ${PROJECT_TARGET} 点。</b></p></div><button id="go">开始本项目</button>`);
  document.getElementById("go").onclick = () => markReady(block, 1);
}

async function markReady(block, trial) {
  state.blockIndex = block; state.trialIndex = trial;
  await dbSet(`groups/${state.groupId}/ready/block_${block}/trial_${trial}/${state.participantId}`, { ready:true, time: await dbServerTimestamp() });
  pageWaitReady(block, trial);
}

function pageWaitReady(block, trial) {
  render(`<h1>准备进入本轮决策</h1><p>系统正在同步三名成员的任务进度。</p><p>请稍等，所有成员准备完成后，本轮决策将同时开始。</p><div class="warn" id="readyBox">等待其他成员准备……</div>`);
  listen(`groups/${state.groupId}/ready/block_${block}/trial_${trial}`, (snap) => {
    const n = Object.keys(snap.val() || {}).length;
    const el = document.getElementById("readyBox");
    if (el) el.textContent = `当前已准备：${n}/${GROUP_SIZE}`;
    if (n >= GROUP_SIZE && document.getElementById("readyBox")) pageDecision(block, trial);
  });
}

async function getCumulative(block, upToTrialInclusive=0) {
  const group = await dbGet(`groups/${state.groupId}`) || {};
  let sum = 0;
  const trials = group.blocks?.[`block_${block}`]?.trials || {};
  for (let t=1; t<=upToTrialInclusive; t++) {
    const choices = trials[`trial_${t}`]?.choices || {};
    Object.values(choices).forEach(ch => sum += Number(ch.donation || 0));
  }
  return sum;
}

async function pageDecision(block, trial) {
  await saveProgress("decision", { blockIndex:block, trialIndex:trial });
  state.selectedDonation = null;
  state.trialStartTime = Date.now();
  // 按用户要求：决策页面不显示每轮进度
  render(`<h1>项目 ${block} / ${BLOCKS}，第 ${trial} / ${TRIALS_PER_BLOCK} 轮</h1><p>本轮你获得 <b>10 点资源</b>。</p><p>请在 0–10 点之间选择你愿意投入公共森林账户的资源点数。未投入公共森林账户的资源点将保留为你的个人积分。</p><p><b>请选择你本轮投入公共森林账户的资源点数：</b></p><div class="choice-grid">${Array.from({length:11}, (_,i)=>`<div class="choice" data-v="${i}">${i}</div>`).join("")}</div><div class="greenbox" id="choiceText">你尚未选择。</div><button id="confirm">确认选择</button>`);
  document.querySelectorAll(".choice").forEach(el => el.onclick = () => {
    document.querySelectorAll(".choice").forEach(x=>x.classList.remove("selected"));
    el.classList.add("selected"); state.selectedDonation = Number(el.dataset.v);
    document.getElementById("choiceText").innerHTML = `你本轮选择投入：<b>${state.selectedDonation}</b> 点<br>你本轮保留个人积分：<b>${10-state.selectedDonation}</b> 分`;
  });
  document.getElementById("confirm").onclick = async () => {
    if (state.selectedDonation === null) return alert("请选择0–10点中的一个数值。");
    const donation = state.selectedDonation;
    await dbSet(`groups/${state.groupId}/blocks/block_${block}/trials/trial_${trial}/choices/${state.participantId}`, { participantId:state.participantId, roleId:state.roleId, condition:state.condition, blockIndex:block, trialIndex:trial, absoluteTrial:absoluteTrial(block,trial), donation, personal_points:10-donation, response_time_ms:Date.now()-state.trialStartTime, submittedAt: await dbServerTimestamp() });
    pageWaitChoices(block, trial);
  };
}

function pageWaitChoices(block, trial) {
  render(`<h1>等待其他成员完成选择</h1><p>你已完成本轮选择。</p><p>请稍等，系统正在等待另外两名成员提交本轮选择。</p><div class="warn" id="choiceBox">等待其他成员提交……</div>`);
  listen(`groups/${state.groupId}/blocks/block_${block}/trials/trial_${trial}/choices`, (snap) => {
    const n = Object.keys(snap.val() || {}).length;
    const el = document.getElementById("choiceBox");
    if (el) el.textContent = `当前已提交：${n}/${GROUP_SIZE}`;
    if (n >= GROUP_SIZE && document.getElementById("choiceBox")) pageFeedback(block, trial);
  });
}

async function pageFeedback(block, trial) {
  const group = await dbGet(`groups/${state.groupId}`) || {};
  const my = group.blocks?.[`block_${block}`]?.trials?.[`trial_${trial}`]?.choices?.[state.participantId] || {};
  const cumulative = await getCumulative(block, trial);
  await dbSet(`groups/${state.groupId}/blocks/block_${block}/trials/trial_${trial}/cumulative`, { cumulative, target:PROJECT_TARGET, updatedAt: await dbServerTimestamp() });
  render(`<h1>本轮结果</h1><div class="greenbox"><p>你本轮投入公共森林账户：</p><p><b>${my.donation} 点</b></p><p>你本轮保留个人积分：</p><p><b>${my.personal_points} 分</b></p></div><div class="box"><p>当前项目公共森林累计投入：</p><p><b>${cumulative} / ${PROJECT_TARGET} 点</b></p><div class="bar-wrap"><div class="bar" style="width:${pct(cumulative,PROJECT_TARGET)}%"></div></div></div><button id="go">${trial < TRIALS_PER_BLOCK ? "进入下一轮" : "查看项目结果"}</button>`);
  document.getElementById("go").onclick = () => {
    if (trial < TRIALS_PER_BLOCK) markReady(block, trial+1);
    else pageBlockEnd(block);
  };
}

async function pageBlockEnd(block) {
  const cumulative = await getCumulative(block, TRIALS_PER_BLOCK);
  const group = await dbGet(`groups/${state.groupId}`) || {};
  let myDonation = 0, myPersonal = 0;
  for (let t=1; t<=TRIALS_PER_BLOCK; t++) {
    const my = group.blocks?.[`block_${block}`]?.trials?.[`trial_${t}`]?.choices?.[state.participantId];
    if (my) { myDonation += Number(my.donation||0); myPersonal += Number(my.personal_points||0); }
  }
  const success = cumulative >= PROJECT_TARGET;
  await dbSet(`groups/${state.groupId}/blocks/block_${block}/result`, { cumulative, target:PROJECT_TARGET, success, updatedAt: await dbServerTimestamp() });
  render(`<h1>项目 ${block} 完成</h1><p>你已经完成第 ${block} 个公共森林项目的 ${TRIALS_PER_BLOCK} 轮决策。</p><div class="box"><p>本项目公共森林累计投入：</p><p><b>${cumulative} / ${PROJECT_TARGET} 点</b></p><div class="bar-wrap"><div class="bar" style="width:${pct(cumulative,PROJECT_TARGET)}%"></div></div></div><div class="greenbox"><p>结果：</p><p><b>${success ? "本项目达到公共森林保护目标。" : "本项目未达到公共森林保护目标。"}</b></p></div><p>你在本项目中累计投入公共森林账户：<b>${myDonation} 点</b></p><p>你在本项目中累计保留个人积分：<b>${myPersonal} 分</b></p><button id="go">${block < BLOCKS ? "进入下一项目" : "进入问卷"}</button>`);
  document.getElementById("go").onclick = () => {
    if (block < BLOCKS) pageConditionInfo(block+1);
    else pageQuestionnaire(0);
  };
}

];

function scaleHTML(item) {
  const left = item.left || "非常不同意";
  const right = item.right || "非常同意";
  return `<div class="scale-item"><p><b>${item.text}</b></p><div class="scale-options">${[1,2,3,4,5,6,7].map(v=>`<label><input type="radio" name="${item.key}" value="${v}"><br>${v}</label>`).join("")}</div><div class="scale-anchors"><span>${left}</span><span>${right}</span></div></div>`;
}

function pageQuestionnaire(groupIdx) {
  const g = questionnaireGroups[groupIdx];
  render(`<p><b>请根据你现在的感受，选择符合你的同意程度。</b></p><p class="muted">1 表示非常不同意或非常不符合，7 表示非常同意或非常符合。请按照第一反应作答。</p>${g.items.map(scaleHTML).join("")}<button id="go">${groupIdx < questionnaireGroups.length-1 ? "下一页" : "提交问卷"}</button>`);
  document.getElementById("go").onclick = async () => {
    for (const item of g.items) {
      const v = document.querySelector(`input[name="${item.key}"]:checked`)?.value;
      if (!v) return alert("请完成本页所有题目。");
      state.questionnaireResponses[item.key] = Number(v);
    }
    if (groupIdx < questionnaireGroups.length-1) pageQuestionnaire(groupIdx+1);
    else {
      await dbSet(`groups/${state.groupId}/members/${state.participantId}/questionnaire`, { ...state.questionnaireResponses, submittedAt: await dbServerTimestamp() });
      pageEnd();
    }
  };
}

async function pageEnd() {
  await dbUpdate(`groups/${state.groupId}/members/${state.participantId}`, { completed:true, completedAt: await dbServerTimestamp(), last_page:"completed" });
  render(`<h1>实验结束</h1><p>你已经完成本实验的全部内容。</p><p>感谢你对本研究的支持！</p><p>请不要与其他可能参加实验的人讨论实验内容，以免影响后续研究结果。</p><div class="greenbox"><p>你的完成编号：</p><p><b>${state.participantId}</b></p></div>`);
}

pageWelcome();
