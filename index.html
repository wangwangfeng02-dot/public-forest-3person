<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>真实3人公共森林投入任务</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: #f4f7f6;
      color: #1f2933;
    }
    .page {
      max-width: 920px;
      margin: 36px auto;
      background: #fff;
      padding: 38px 46px;
      border-radius: 18px;
      box-shadow: 0 8px 28px rgba(0,0,0,.08);
    }
    h1 { font-size: 28px; margin: 0 0 22px; color: #0f5132; }
    h2 { font-size: 21px; margin: 24px 0 14px; color: #14532d; }
    p, li { font-size: 17px; line-height: 1.85; }
    button {
      background: #166534;
      color: #fff;
      border: none;
      padding: 13px 24px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
      margin-right: 10px;
    }
    button:hover { background: #14532d; }
    button.secondary { background: #64748b; }
    button.secondary:hover { background: #475569; }
    input, select {
      width: 100%;
      padding: 11px 12px;
      margin: 8px 0 18px;
      font-size: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
    }
    label { font-size: 16px; }
    table { width: 100%; border-collapse: collapse; margin: 16px 0; }
    th, td { border: 1px solid #dbe3ea; padding: 10px; text-align: center; font-size: 15px; }
    th { background: #f1f5f9; }
    .highlight {
      background: #edf7ed;
      border-left: 5px solid #2f855a;
      padding: 16px 18px;
      margin: 20px 0;
      border-radius: 10px;
      font-size: 17px;
      line-height: 1.8;
    }
    .norm-cue {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-left: 5px solid #16a34a;
      padding: 14px 16px;
      margin: 18px 0 22px;
      border-radius: 10px;
      font-size: 16px;
      line-height: 1.75;
    }
    .norm-cue .cue-title {
      font-weight: bold;
      color: #14532d;
      margin-bottom: 6px;
    }
    .norm-cue p {
      margin: 4px 0;
      font-size: 16px;
      line-height: 1.75;
    }
    .control-cue {
      background: #f8fafc;
      border-color: #cbd5e1;
      border-left-color: #94a3b8;
    }
    .static-cue {
      background: #f8fafc;
      border-color: #cbd5e1;
      border-left-color: #64748b;
    }
    .dynamic-cue {
      background: #ecfdf5;
      border-color: #bbf7d0;
      border-left-color: #16a34a;
    }
    .static-cue p, .static-cue b,
    .dynamic-cue p, .dynamic-cue b,
    .norm-red-text, .norm-red-text b,
    .norm-red-box, .norm-red-box p, .norm-red-box b {
      color: #d00000 !important;
      font-weight: 800 !important;
    }
    .norm-red-box {
      background: #fff1f2 !important;
      border-left-color: #d00000 !important;
    }
    .timeout-box {
      background: #fef2f2;
      border-left: 5px solid #dc2626;
      padding: 16px 18px;
      margin: 20px 0;
      border-radius: 10px;
      font-size: 16px;
    }
    .warning {
      background: #fff7ed;
      border-left: 5px solid #f97316;
      padding: 14px 18px;
      margin: 20px 0;
      border-radius: 10px;
      font-size: 16px;
    }
    .muted { color: #64748b; font-size: 14px; }
    .choice-grid {
      display: grid;
      grid-template-columns: repeat(11, 1fr);
      gap: 8px;
      margin: 24px 0;
    }
    .choice-btn {
      background: #e2e8f0;
      color: #0f172a;
      border-radius: 10px;
      padding: 14px 0;
      font-size: 18px;
      cursor: pointer;
      text-align: center;
      border: 2px solid transparent;
      user-select: none;
    }
    .choice-btn:hover { background: #cbd5e1; }
    .choice-btn.selected {
      background: #bbf7d0;
      border-color: #16a34a;
      color: #14532d;
      font-weight: bold;
    }
    .progress-box {
      background: #f8fafc;
      padding: 16px;
      border-radius: 12px;
      margin: 18px 0;
      border: 1px solid #e2e8f0;
    }
    .bar-wrap {
      width: 100%;
      height: 18px;
      background: #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
    }
    .bar { height: 18px; background: #16a34a; width: 0%; transition: width .3s ease; }
    .radio-row { margin: 16px 0; line-height: 1.9; }
    .radio-row input { width: auto; margin-right: 8px; }
    .scale-row {
      margin: 18px 0;
      padding: 14px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      background: #f8fafc;
    }
    .scale-options {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-top: 12px;
      text-align: center;
    }
    .scale-options input { width: auto; margin: 3px; }
    .scale-anchor {
      display: flex;
      justify-content: space-between;
      color: #64748b;
      font-size: 14px;
      margin-top: 6px;
    }

    .project-visual {
      margin: 18px 0 22px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #dbe3ea;
      background: #f8fafc;
      box-shadow: 0 5px 18px rgba(15, 81, 50, 0.08);
    }
    .project-visual img,
    .feedback-visual img {
      width: 100%;
      display: block;
      aspect-ratio: 4 / 3;
      object-fit: cover;
    }
    .project-caption {
      padding: 12px 16px;
      color: #475569;
      font-size: 14px;
      line-height: 1.7;
      background: #f8fafc;
    }
    .donation-use-box {
      background: #f0fdf4;
      border-left: 5px solid #16a34a;
      padding: 14px 18px;
      margin: 18px 0;
      border-radius: 10px;
      line-height: 1.8;
    }
    .donation-use-box p { margin: 4px 0; }
    .feedback-visual {
      margin: 18px 0 20px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #dbe3ea;
      background: #fff;
      box-shadow: 0 5px 18px rgba(15, 81, 50, 0.08);
    }
    .feedback-status {
      padding: 14px 18px;
      line-height: 1.8;
      border-top: 1px solid #e2e8f0;
    }
    .feedback-status-title {
      font-weight: 800;
      font-size: 17px;
      margin-bottom: 4px;
    }
    .feedback-low .feedback-status {
      background: #fff7ed;
      border-left: 5px solid #f97316;
    }
    .feedback-mid .feedback-status {
      background: #ecfeff;
      border-left: 5px solid #0891b2;
    }
    .feedback-high .feedback-status {
      background: #f0fdf4;
      border-left: 5px solid #16a34a;
    }



    .mini-chart-card {
      margin: 18px 0 22px;
      padding: 16px 18px;
      border-radius: 12px;
      background: #fff7f7;
      border: 1px solid #fecaca;
    }
    .mini-chart-title {
      font-weight: 800;
      color: #991b1b;
      margin-bottom: 8px;
      font-size: 16px;
      text-align: center;
    }
    .mini-chart {
      width: 100%;
      max-width: 430px;
      height: auto;
      display: block;
      margin: 0 auto;
    }
    .guide-line {
      stroke: #e5e7eb;
      stroke-width: 2;
      stroke-dasharray: 5 5;
    }
    .dynamic-line,
    .static-line {
      stroke: #dc2626;
      stroke-width: 5;
      fill: none;
    }
    .dynamic-point,
    .static-point,
    .dynamic-arrow,
    .static-arrow {
      fill: #dc2626;
    }
    .chart-value {
      fill: #dc2626;
      font-size: 17px;
      font-weight: 800;
    }
    .chart-label-red {
      fill: #b91c1c;
      font-size: 15px;
      font-weight: 800;
    }
    .mini-chart-note {
      margin-top: 8px;
      color: #991b1b;
      font-weight: 800;
      text-align: center;
      line-height: 1.7;
    }

    .version {
      position: fixed;
      right: 10px;
      bottom: 8px;
      color: #94a3b8;
      font-size: 12px;
    }
  </style>
</head>

    const state = {
      participantId: "",
      groupId: "",
      roleId: "",
      slot: null,
      condition: "",
      groupNumber: null,
      info: {},
      currentBlock: 1,
      currentTrial: 1,
      selectedDonation: null,
      trialStartTime: null,
      possibleRepeat: false,
      heartbeatTimer: null,
      groupAbortUnsubscribe: null
    };

    const appDiv = document.getElementById("app");

    function uid(prefix) {
      return `${prefix}_${Math.random().toString(36).slice(2, 10)}_${Date.now()}`;
    }

    function render(html) {
      appDiv.innerHTML = `<div class="page">${html}</div>`;
      window.scrollTo(0, 0);
    }

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function percent(num, den) {
      if (!den || den <= 0) return 0;
      return Math.min(100, Math.round((Number(num) / Number(den)) * 100));
    }

    function conditionName(condition) {
      if (condition === "control") return "控制组";
      if (condition === "static") return "静态规范组";
      if (condition === "dynamic") return "动态规范组";
      return condition;
    }

    async function saveProgress(pageName, extra = {}) {
      if (!state.groupId || !state.participantId) return;
      await update(ref(db, `${BASE_PATH}/groups/${state.groupId}/members/${state.participantId}`), {
        last_page: pageName,
        last_update: serverTimestamp(),
        ...extra
      });
    }

    async function getGroupData() {
      const snap = await get(ref(db, `${BASE_PATH}/groups/${state.groupId}`));
      return snap.val() || {};
    }


    function startHeartbeat() {
      if (state.heartbeatTimer) clearInterval(state.heartbeatTimer);
      updateHeartbeat();
      state.heartbeatTimer = setInterval(updateHeartbeat, HEARTBEAT_INTERVAL_MS);
      if (!state.groupAbortUnsubscribe && state.groupId) listenForGroupAbort();
    }

    async function updateHeartbeat(extra = {}) {
      if (!state.groupId || !state.participantId) return;
      try {
        await update(ref(db, `${BASE_PATH}/groups/${state.groupId}/members/${state.participantId}`), {
          last_seen_ms: Date.now(),
          last_seen: serverTimestamp(),
          is_online: true,
          ...extra
        });
      } catch (e) {
        console.warn("heartbeat failed", e);
      }
    }

    function stopHeartbeat() {
      if (state.heartbeatTimer) {
        clearInterval(state.heartbeatTimer);
        state.heartbeatTimer = null;
      }
    }

    window.addEventListener("beforeunload", () => {
      if (state.groupId && state.participantId) {
        update(ref(db, `${BASE_PATH}/groups/${state.groupId}/members/${state.participantId}`), {
          is_online: false,
          left_at_ms: Date.now()
        });
      }
    });

    function listenForGroupAbort() {
      if (!state.groupId) return;
      const statusRef = ref(db, `${BASE_PATH}/groups/${state.groupId}/status`);
      state.groupAbortUnsubscribe = onValue(statusRef, (snap) => {
        const status = snap.val();
        if (status === "partner_dropped" || status === "match_timeout") {
          pageTerminated(
            "实验无法继续",
            "有小组成员长时间未进入下一步或连接中断，本组实验已终止。",
            status === "match_timeout" ? "UNMATCHED" : "PARTNER_DROPPED"
          );
        }
      });
    }

    async function abortGroup(reason, stage) {
      if (!state.groupId || !state.participantId) return;
      const status = stage === "matching" ? "match_timeout" : "partner_dropped";
      const payload = {
        status,
        dropout_reason: reason,
        dropout_stage: stage,
        dropout_by: state.participantId,
        dropout_at_ms: Date.now(),
        dropoutAt: serverTimestamp()
      };
      await update(ref(db, `${BASE_PATH}/groups/${state.groupId}`), payload);
      await update(ref(db, `${BASE_PATH}/groups/${state.groupId}/members/${state.participantId}`), {
        exit_code: status === "match_timeout" ? "UNMATCHED" : "PARTNER_DROPPED",
        last_page: stage,
        ended_early: true,
        endedAt: serverTimestamp()
      });
      await saveParticipantSummary(false, status);
    }

    function makeWaitTimeout(stage, ms) {
      return setTimeout(async () => {
        try {
          await abortGroup("wait_timeout", stage);
        } finally {
          pageTerminated(
            "等待超时",
            "由于其他成员长时间未完成当前步骤，本组实验已自动终止。请联系实验人员或重新安排实验。",
            stage === "matching" ? "UNMATCHED" : "PARTNER_DROPPED"
          );
        }
      }, ms);
    }

    function pageTerminated(title, message, code) {
      stopHeartbeat();
      render(`
        <h1>${title}</h1>

          <p>${message}</p>
          <p>结束代码：<b>${code}</b></p>
        </div>

      `);

    async function saveParticipantSummary(completed, reason = "") {
      if (!state.participantId) return;
      let totalDonation = 0;
      let totalPersonal = 0;
      let totalTrials = 0;
      let ge5Count = 0;
      let highCount = 0;
      let rtSum = 0;
      let rtN = 0;
      try {
        const groupData = state.groupId ? await getGroupData() : {};
        for (let b = 1; b <= BLOCKS; b++) {
          for (let t = 1; t <= TRIALS_PER_BLOCK; t++) {
            const ch = groupData?.blocks?.[`block_${b}`]?.trials?.[`trial_${t}`]?.choices?.[state.participantId];
            if (ch) {
              const d = Number(ch.donation || 0);
              totalDonation += d;
              totalPersonal += Number(ch.personal_points || 0);
              totalTrials += 1;
              if (d >= 5) ge5Count += 1;
              if (d >= 8) highCount += 1;
              if (ch.response_time_ms !== undefined) {
                rtSum += Number(ch.response_time_ms || 0);
                rtN += 1;
              }
            }
          }
        }
      } catch (e) {
        console.warn("summary calculation failed", e);
      }
      const summary = {
        participantId: state.participantId,
        groupId: state.groupId || null,
        groupNumber: state.groupNumber || null,
        condition: state.condition || null,
        roleId: state.roleId || null,
        slot: state.slot || null,
        info: state.info || {},
        completed,
        incomplete_reason: reason || null,
        total_trials_completed: totalTrials,
        expected_trials: BLOCKS * TRIALS_PER_BLOCK,
        questionnaire_completed: completed,
        total_donation: totalDonation,
        mean_donation: totalTrials ? Number((totalDonation / totalTrials).toFixed(3)) : null,
        total_personal_points: totalPersonal,
        donation_ge5_count: ge5Count,
        high_donation_ge8_count: highCount,
        mean_response_time_ms: rtN ? Number((rtSum / rtN).toFixed(1)) : null,
        possible_repeat: state.possibleRepeat,
        last_page_saved_at_ms: Date.now(),
        updatedAt: serverTimestamp()
      };
      await set(ref(db, `${BASE_PATH}/summary/participants/${state.participantId}`), summary);
    }

    async function joinGroup() {
      render(`
        <h1>正在匹配小组成员</h1>
        <p>系统正在为你匹配另外两名参与者。</p>
        <p>匹配成功后，你们三人将组成一个小组，共同完成公共森林投入任务。</p>
        <div class="warning" id="matchStatus">正在加入匹配队列……</div>
      `);

      const now = Date.now();
      const matchRef = ref(db, `${BASE_PATH}/matchState`);
      const result = await runTransaction(matchRef, (current) => {
        const expired = current?.createdAtMs && (now - current.createdAtMs > MATCH_TIMEOUT_MS);
        const needNewGroup = !current || !current.activeGroupId || current.status === "full" || (current.nextSlot || 1) > GROUP_SIZE || expired;

        if (needNewGroup) {
          const groupCounter = (current?.groupCounter || 0) + 1;
          const groupId = uid("G");
          const condition = CONDITIONS[(groupCounter - 1) % CONDITIONS.length];
          return {
            groupCounter,
            activeGroupId: groupId,
            condition,
            nextSlot: 2,
            status: "waiting",
            createdAtMs: now,
            activeMembers: {
              [state.participantId]: 1
            }
          };
        }

        current.activeMembers = current.activeMembers || {};
        if (!current.activeMembers[state.participantId]) {
          const slot = current.nextSlot || 1;
          current.activeMembers[state.participantId] = slot;
          current.nextSlot = slot + 1;
          current.status = slot >= GROUP_SIZE ? "full" : "waiting";
        }
        return current;
      });

      const matchData = result.snapshot.val();
      state.groupId = matchData.activeGroupId;
      state.condition = matchData.condition;
      state.groupNumber = matchData.groupCounter;
      state.slot = matchData.activeMembers[state.participantId];
      state.roleId = `成员${state.slot}`;

      await update(ref(db, `${BASE_PATH}/groups/${state.groupId}`), {
        groupId: state.groupId,
        groupNumber: state.groupNumber,
        condition: state.condition,
        status: matchData.status,
        createdAtMs: matchData.createdAtMs,
        updatedAt: serverTimestamp()
      });

      await set(ref(db, `${BASE_PATH}/groups/${state.groupId}/members/${state.participantId}`), {
        participantId: state.participantId,
        roleId: state.roleId,
        slot: state.slot,
        info: state.info,
        possible_repeat: state.possibleRepeat,
        joinedAt: serverTimestamp(),
        last_page: "matched"
      });

      await set(ref(db, `${BASE_PATH}/participants/${state.participantId}`), {
        participantId: state.participantId,
        groupId: state.groupId,
        groupNumber: state.groupNumber,
        condition: state.condition,
        roleId: state.roleId,
        slot: state.slot,
        info: state.info,
        possible_repeat: state.possibleRepeat,
        joinedAt: serverTimestamp()
      });

      startHeartbeat();

      if (matchData.status === "full") {
        await update(ref(db, `${BASE_PATH}/groups/${state.groupId}`), {
          status: "full",
          formedAt: serverTimestamp()
        });
      }

      listenForGroupFull();
    }

    function listenForGroupFull() {
      const membersRef = ref(db, `${BASE_PATH}/groups/${state.groupId}/members`);
      let moved = false;
      const waitTimer = makeWaitTimeout("matching", MATCH_TIMEOUT_MS);
      const unsubscribe = onValue(membersRef, async (snap) => {
        const members = snap.val() || {};
        const count = Object.keys(members).length;
        const statusEl = document.getElementById("matchStatus");
        if (statusEl) statusEl.textContent = `当前状态：等待成员加入（${count}/${GROUP_SIZE}）`;
        if (!moved && count >= GROUP_SIZE) {
          moved = true;
          clearTimeout(waitTimer);
          unsubscribe();
          await update(ref(db, `${BASE_PATH}/groups/${state.groupId}`), { status: "full", formedAt: serverTimestamp() });
          pageGroupIntro();
        }
      });
    }

    async function calculateBlockCumulative(blockIndex, throughTrial) {
      const groupData = await getGroupData();
      let sum = 0;
      for (let t = 1; t <= throughTrial; t++) {
        const choices = groupData?.blocks?.[`block_${blockIndex}`]?.trials?.[`trial_${t}`]?.choices || {};
        Object.values(choices).forEach(ch => sum += Number(ch.donation || 0));
      }
      return sum;
    }

    async function pageTrialFeedback(blockIndex, trialIndex) {
      const groupData = await getGroupData();
      const choices = groupData?.blocks?.[`block_${blockIndex}`]?.trials?.[`trial_${trialIndex}`]?.choices || {};
      const myChoice = choices[state.participantId];
      const cumulative = await calculateBlockCumulative(blockIndex, trialIndex);
      await update(ref(db, `${BASE_PATH}/groups/${state.groupId}/blocks/block_${blockIndex}/trials/trial_${trialIndex}`), {
        cumulative_after: cumulative,
        updatedAt: serverTimestamp()
      });
      render(`
        <h1>本轮结果</h1>
        <div class="highlight">
          <p>你本轮投入公共森林账户：</p>
          <p><b>${myChoice?.donation ?? ""} 点</b></p>
          <p>你本轮保留个人积分：</p>
          <p><b>${myChoice?.personal_points ?? ""} 分</b></p>
        </div>
        <div class="progress-box">
          <p>当前项目公共森林累计投入：</p>
          <p><b>${cumulative} / ${BLOCK_TARGET} 点</b></p>
          <div class="bar-wrap"><div class="bar" style="width:${percent(cumulative, BLOCK_TARGET)}%"></div></div>
        </div>

        ${feedbackVisualHtml(blockIndex, cumulative)}

        <button id="nextBtn">${trialIndex < TRIALS_PER_BLOCK ? "进入下一轮" : "查看项目结果"}</button>
      `);
      document.getElementById("nextBtn").onclick = () => {
        if (trialIndex < TRIALS_PER_BLOCK) {
          markReadyForTrial(blockIndex, trialIndex + 1);
        } else {
          pageBlockEnd(blockIndex);
        }
      };
    }

    async function pageBlockEnd(blockIndex) {
      const groupData = await getGroupData();
      let groupTotal = 0;
      let myDonationTotal = 0;
      let myPersonalTotal = 0;
      for (let t = 1; t <= TRIALS_PER_BLOCK; t++) {
        const choices = groupData?.blocks?.[`block_${blockIndex}`]?.trials?.[`trial_${t}`]?.choices || {};
        Object.values(choices).forEach(ch => groupTotal += Number(ch.donation || 0));
        const my = choices[state.participantId];
        if (my) {
          myDonationTotal += Number(my.donation || 0);
          myPersonalTotal += Number(my.personal_points || 0);
        }
      }
      const success = groupTotal >= BLOCK_TARGET;
      await update(ref(db, `${BASE_PATH}/groups/${state.groupId}/blocks/block_${blockIndex}`), {
        groupTotal,
        target: BLOCK_TARGET,
        success,
        completedAt: serverTimestamp()
      });
      render(`
        <h1>项目 ${blockIndex} 完成</h1>
        <p>你已经完成第 ${blockIndex} 个公共森林项目的 ${TRIALS_PER_BLOCK} 轮决策。</p>
        <div class="progress-box">
          <p>本项目公共森林累计投入：</p>
          <p><b>${groupTotal} / ${BLOCK_TARGET} 点</b></p>
          <div class="bar-wrap"><div class="bar" style="width:${percent(groupTotal, BLOCK_TARGET)}%"></div></div>
        </div>
        <div class="highlight">
          <p>结果：</p>
          <p><b>${success ? "本项目达到公共森林保护目标。" : "本项目未达到公共森林保护目标。"}</b></p>
        </div>
        <p>你在本项目中累计投入公共森林账户：<b>${myDonationTotal} 点</b></p>
        <p>你在本项目中累计保留个人积分：<b>${myPersonalTotal} 分</b></p>
        <button id="nextBtn">${blockIndex < BLOCKS ? "进入下一个公共森林项目" : "进入问卷"}</button>
      `);
      document.getElementById("nextBtn").onclick = () => {
        if (blockIndex < BLOCKS) {
          pageConditionInfo(blockIndex + 1);
        } else {
          pageQuestionnaire(0, {});
        }
      };
    }

    function scaleItem(item) {
      const left = item.left || "非常不同意";
      const right = item.right || "非常同意";
      return `
        <div class="scale-row">
          <p>${escapeHtml(item.text)}</p>
          <div class="scale-anchor"><span>${escapeHtml(left)}</span><span>${escapeHtml(right)}</span></div>
          <div class="scale-options">
            ${[1,2,3,4,5,6,7].map(v => `
              <label><input type="radio" name="${item.key}" value="${v}"><br>${v}</label>
            `).join("")}
          </div>
        </div>
      `;
    }

    function pageQuestionnaire(pageIndex, answers) {
      const pageSize = 5;
      const totalPages = Math.ceil(questionnaireItems.length / pageSize);
      const start = pageIndex * pageSize;
      const items = questionnaireItems.slice(start, start + pageSize);
      render(`
        <p class="muted">问卷 ${pageIndex + 1} / ${totalPages}</p>
        <p><b>请根据你现在的感受，选择符合你的同意程度。</b></p>
        <p class="muted">1 表示最左侧描述，7 表示最右侧描述。请选择最符合你当前感受的选项。</p>
        ${items.map(scaleItem).join("")}
        <button id="prevBtn" class="secondary" ${pageIndex === 0 ? "style='display:none'" : ""}>上一页</button>
        <button id="nextBtn">${pageIndex === totalPages - 1 ? "提交问卷" : "下一页"}</button>
      `);
      if (pageIndex > 0) {
        document.getElementById("prevBtn").onclick = () => pageQuestionnaire(pageIndex - 1, answers);
      }
      document.getElementById("nextBtn").onclick = async () => {
        const newAnswers = { ...answers };
        for (const item of items) {
          const v = document.querySelector(`input[name="${item.key}"]:checked`)?.value;
          if (!v) {
            alert("请完成本页所有题目。");
            return;
          }
          newAnswers[item.key] = Number(v);
        }
        if (pageIndex < totalPages - 1) {
          pageQuestionnaire(pageIndex + 1, newAnswers);
        } else {
          await set(ref(db, `${BASE_PATH}/groups/${state.groupId}/members/${state.participantId}/questionnaire`), {
            ...newAnswers,
            submittedAt: serverTimestamp()
          });
          pageEnd();
        }
      };
    }

    async function pageEnd() {
      await update(ref(db, `${BASE_PATH}/groups/${state.groupId}/members/${state.participantId}`), {
        completed: true,
        completedAt: serverTimestamp(),
        last_page: "completed",
        is_online: false
      });
      await saveParticipantSummary(true, "");
      localStorage.setItem("public_forest_3person_completed", String(Date.now()));
      stopHeartbeat();
      render(`
        <h1>实验结束</h1>
        <p>你已经完成本实验的全部内容。</p>
        <p>感谢你对本研究的支持！</p>
        <p>请不要与其他可能参加实验的人讨论实验内容，以免影响后续研究结果。</p>
        <div class="highlight">
          <p>你的完成编号：</p>
          <p><b>${state.participantId}</b></p>
        </div>
      `);
    }

    pageWelcome();
  </script>
</body>
</html>
